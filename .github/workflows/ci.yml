name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: these jobs only read the repo and upload to Codecov via a
# token, so the default read/write GITHUB_TOKEN is more than they need.
permissions:
  contents: read

# Cancel a superseded run when new commits land on the same ref (e.g. rapid
# pushes to a PR) instead of letting a stale full matrix run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs the SAME hooks as a local `pre-commit run --all-files`: the hygiene
  # checks (trailing whitespace, EOF, line endings, YAML/TOML, large files,
  # merge markers) plus ruff lint + ruff format. This is the single style/
  # hygiene gate. The pyright + unittest hooks are SKIPped here because the
  # lint-and-test job below already runs them across the Python matrix.
  pre-commit:
    name: pre-commit (lint + format + hygiene)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      # pre-commit/action@v3.0.1 is unmaintained (last release Feb 2024) and
      # pins actions/cache@v4 internally, which runs on the now-deprecated
      # Node 20. Run pre-commit directly and cache its hook environments with a
      # Node 24 actions/cache instead. SKIP mirrors the wrapper's old behaviour:
      # pyright + unittest run across the matrix in lint-and-test, not here.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure --color=always
        env:
          SKIP: pyright,unittest

  lint-and-test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
            python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install MIDI build deps (python-rtmidi)
        # python-rtmidi has no wheel for every interpreter (e.g. cp313), so uv
        # builds it from sdist; the meson build needs the ALSA dev headers or
        # it errors with "Dependency alsa not found". Cheap apt install.
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install runtime + dev deps
        # Skip the [all] extras here — most pull in heavy native libs
        # (PyAV, pygame, sounddevice) that aren't needed for the
        # unittest suite, which mocks all hardware paths. Add specific
        # extras here if you start testing them.
        # `midi` (mido + python-rtmidi) IS included: the MidiScene suite is
        # gated `@skipUnless(HAVE_MIDI)`, so without it those tests silently
        # skip and the module reads as uncovered. The tests never open a real
        # port (they patch mido / use scripted ports), so they run headless.
        # --frozen: use uv.lock exactly, error if it's out of date
        # --no-default-groups: skip [tool.uv] default-groups (which is [dev])
        # --group dev: pull in the dev dependency group
        run: uv sync --frozen --no-default-groups --group dev --extra midi

      # Ruff lint + format are enforced in the `pre-commit` job above (single
      # style gate), so they're intentionally not repeated here.
      - name: Mypy --strict (hot modules)
        run: uv run mypy c64cast/api.py c64cast/audio.py c64cast/playlist.py

      - name: Pyright (basic, whole tree)
        run: uv run pyright

      - name: Unit tests
        run: uv run python -m unittest discover tests -v

  coverage:
    name: coverage (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        # lint-and-test already runs the full suite on every supported version;
        # coverage is version-independent (the report is identical across them),
        # so it runs once on the primary toolchain version (matches mise.toml)
        # and that single leg is what feeds Codecov below.
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
            python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install MIDI build deps (python-rtmidi)
        # See lint-and-test: rtmidi's sdist build needs the ALSA dev headers.
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install dev deps
        # Include the `midi` extra so the @skipUnless(HAVE_MIDI) MidiScene
        # suite runs here — otherwise midi_scene.py reads as uncovered and
        # tanks the codecov patch/project gates. See the lint-and-test job.
        run: uv sync --frozen --no-default-groups --group dev --extra midi

      - name: Coverage
        # `make coverage` (scripts/coverage.sh) is the single source of truth:
        # it runs the suite through `xmlrunner discover` and emits both
        # coverage.xml (Codecov coverage) and test-results/*.xml (Codecov Test
        # Analytics) from one run. Same discovery as `make test`.
        run: uv run make coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

      # Push to Codecov so the live README badge updates. Tokenless upload works
      # for public repos; set the CODECOV_TOKEN secret to lift the rate limits /
      # cover a private repo. The `if` guard is defensive — it keeps the upload
      # single-leg should more versions ever be re-added to this matrix.
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # Test Analytics: ingest the JUnit XML produced by `make coverage`.
      # `!cancelled()` so results upload even when the suite is red (xmlrunner
      # writes the XML before exiting non-zero). https://docs.codecov.com/docs/test-analytics
      # Test-result upload now goes through codecov-action with
      # `report_type: test_results` (same action as the coverage upload above,
      # one step earlier with the default `coverage` type). The standalone
      # codecov/test-results-action@v1 was deprecated in favour of this and ran
      # on the now-deprecated Node 20.
      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.python-version == '3.14' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          report_type: test_results
          files: ./test-results/*.xml
          token: ${{ secrets.CODECOV_TOKEN }}
