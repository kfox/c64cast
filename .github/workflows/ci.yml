name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
            python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install runtime + dev deps
        # Skip the [all] extras here — most pull in heavy native libs
        # (PyAV, pygame, sounddevice) that aren't needed for the
        # unittest suite, which mocks all hardware paths. Add specific
        # extras here if you start testing them.
        # --frozen: use uv.lock exactly, error if it's out of date
        # --no-default-groups: skip [tool.uv] default-groups (which is [dev])
        # --group dev: pull in the dev dependency group
        run: uv sync --frozen --no-default-groups --group dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy --strict (hot modules)
        run: uv run mypy c64cast/api.py c64cast/audio.py c64cast/playlist.py

      - name: Pyright (basic, whole tree)
        run: uv run pyright

      - name: Unit tests
        run: uv run python -m unittest discover tests -v

  coverage:
    name: coverage (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
            python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dev deps
        run: uv sync --frozen --no-default-groups --group dev

      - name: Coverage
        run: |
          uv run coverage run -m unittest discover tests
          uv run coverage report
          uv run coverage xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

      # Push to Codecov once (from a single matrix leg — the report is
      # identical across Python versions) so the live README badge updates.
      # Tokenless upload works for public repos; set the CODECOV_TOKEN secret
      # to lift the rate limits / cover a private repo.
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
