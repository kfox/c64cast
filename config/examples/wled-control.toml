#:schema ../../c64cast.schema.json
# Control c64cast FROM the WLED app (WLED bridge Mode 1 — "listen").
#
# [wled].listen turns c64cast INTO a virtual WLED device: it advertises itself
# over mDNS (_wled._tcp) and serves a subset of the WLED JSON HTTP/WS API, so
# the official WLED mobile/web app (or python-wled, or Home Assistant's WLED
# integration) discovers it like any real WLED controller and can:
#   - turn it on/off                                    -> pause/resume
#   - set "brightness"                                  -> real dim of the C64
#     screen (independent of power: 0 = fully black, higher = brighter; the dim
#     survives scene changes until you raise it again, and it never pauses)
#   - pick an "effect" from the dropdown                -> jumps to that scene
#   - move the sx/ix sliders                            -> sweeps the current
#                                                          scene's live params
#     (e.g. on "Fire" below, ix raises/lowers the flame height; on a plasma,
#      sx cycles the color faster; on a SID waveform scope, ix scales the
#      trace amplitude — sx/ix are silent no-ops on scenes with no live knob)
#
# This is the OTHER direction from scene-wled.toml (Mode 2, where the C64
# becomes a pixel *sink* for a realtime video stream). Mode 1 sends no pixels
# anywhere — it's a control surface. The WLED app itself can't stream pixels,
# so it's the natural fit for this mode, not Mode 2.
#
# Effect switching only does something useful with more than one scene (a
# single-scene config has nowhere to jump to), so this demo runs a small
# playlist: the WLED effect list will show "Hello" / "Plasma" / "Fire" /
# "Waveform". Requires the `wled` extra (zeroconf + fastapi + uvicorn).
#
# The "Waveform" scene plays a SID and needs a .sid file — drop one into
# assets/sids/ first (HVSC: https://hvsc.c64.org). Without one, the scene
# fails to build at startup; delete its [[scenes]] block below if you just
# want the three hardware-free scenes.
#
# Run:
#   python -m c64cast --config config/examples/wled-control.toml
# Then open the WLED app, let it discover "c64cast" on the LAN (or add it
# manually by IP), and drive it from there. If the effect dropdown looks stale
# after you change this playlist, c64cast bumps its reported WLED `vid` when the
# scene list changes so the app re-fetches — no manual cache clear needed.
#
# Tip: pointing a plain browser at http://<c64>:8080/ opens c64cast's own
# control page. Unlike the WLED app (which renders a fixed control set), that
# page grays out controls that can't act on the current scene — e.g. the palette
# and color pickers are disabled on "Hello" (a char/blank scene), and the
# speed/intensity sliders are disabled on scenes with no matching live param.

[ultimate64]
url = "http://ultimate-64-ii.lan"

[wled]
listen = "enabled"   # binds the WLED JSON API on 0.0.0.0:8080; needs the `wled` extra
name = "c64cast"     # friendly/mDNS name shown in the WLED app's device list

[playlist]
interleave_videos = false
loop = true

[[scenes]]
type = "blank"
name = "Hello"
border = 0
background = 6
duration_s = 30.0
audio = false   # title card — no mic/DAC audio (the sx/ix sliders no-op here)

  [[scenes.overlays]]
  type = "big_text"
  row = "middle"
  speed_cells_per_s = 12.0
  messages = [{ text = "WLED APP CONTROLLED", color = "rainbow" }]

[[scenes]]
type = "generative"
name = "Plasma"
source = "plasma"
display = "mhires"
duration_s = 30.0

[[scenes]]
type = "generative"
name = "Fire"
source = "fire"
display = "mhires"
audio_source = "none"
duration_s = 30.0

[[scenes]]
# SID oscilloscope — needs a .sid in assets/sids/ (see the header note). On this
# scene the ix slider drives `scene.gain`, scaling the scope trace amplitude
# (sx is a no-op — a scope has no speed-ish live knob). Delete this block to
# keep the demo hardware-/asset-free.
type = "waveform"
name = "Waveform"
file = "assets/sids/**/*.sid"   # recurses an unpacked HVSC tree; picks one at random
duration_s = 60.0
color_mode = "per_voice"
voice_colors = ["cyan", "yellow", "light green"]
