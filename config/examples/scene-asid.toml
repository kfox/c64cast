#:schema ../../c64cast.schema.json
# Single-scene demo: ASID stream → real SID + oscilloscope.
#
# Turns c64cast into an ASID *client*. An ASID *host* — DeepSID (in a browser),
# SIDFactory II, Plogue chipsynth C64, Elektron ASID-XP — streams packed SID
# register writes over MIDI SysEx; this scene decodes them, plays them on the
# U64's real SID chip, and draws a full-screen hires oscilloscope of the three
# voices. Voices draw in color while sounding and gray out when idle; the bottom
# rows show the play state / SID type and either the host's "now playing" text
# (ASID 0x4F) or a per-voice waveform + volume summary. (Bitmap-only: PETSCII
# overlays don't apply, like a waveform scene.)
#
# Unlike the `midi` scene (which synthesises SID writes from notes/CCs), ASID
# carries the finished register bytes — the whole tune, exactly as its player
# would write it — so there are no synth knobs here. This is a NEW INPUT path,
# not an audio change: it plays only SID chip-music (not arbitrary/PCM audio),
# and leaves the video-audio backends untouched.
#
# Requires:
#   - The `midi` extra (`pip install -e .[midi]`): mido + python-rtmidi.
#     ASID rides the same MIDI transport.
#   - An ASID host pointed at a MIDI port. On macOS, enable IAC in Audio MIDI
#     Setup and select it as the host's ASID output; on Linux, `modprobe
#     snd-virmidi`. DeepSID (Settings → ASID) is the easiest smoke test.
#
# `asid_port` is a substring match against available input port names.
# Empty string ("" or commented out) picks the first available port.
#
# Multi-SID (U64 only): ASID streams carrying several chips (commands 0x50-0x5F)
# are honored — c64cast configures the U64 for multiple SIDs live (preferring
# physical socket SIDs, then UltiSID cores) and routes each chip to its own
# address, and the scope subdivides each voice row horizontally, one window per
# chip (voice 1 of every chip side by side, etc.). The prior U64 SID-address
# config is restored on teardown. On backends without the config API (TeensyROM)
# or with `asid_multi_sid = false`, extra chips downmix to the primary SID.
#
# Cycle-accurate multispeed (U64 only): `asid_buffered_player` moves frame
# consumption onto the C64 — a CIA #1 Timer A 6502 player pops one serialized
# frame per tick from a REU ring, honoring the ASID 0x30 write-order/wait recipe.
# This fixes the coalesced path's dropped frames on multispeed tunes (0x31 up to
# 16x): arpeggios, fast vibrato, and hard restarts survive. Default `auto` turns
# it on wherever the backend has an REU; `off` forces the host-coalesced flush;
# `on` forces the ring player (warns + falls back on a no-REU backend). On
# TeensyROM / no-REU backends the coalesced path is used regardless.
#
# Known v1 limits: OPL-FM streams are recognised but not applied; the buffered
# player's cycle delay is coarse, and a pathological 8-SID x 16x frame can
# overrun the frame period. With the buffered player off, high-multispeed tunes
# are frame-decimated to protect the DMA link.
#
# Run:
#   python -m c64cast --config config/examples/scene-asid.toml

[ultimate64]
url = "http://ultimate-64-ii.lan"

[playlist]
interleave_videos = false

[[scenes]]
type = "asid"
name = "ASID"
asid_port = ""                # "" = first port; or e.g. "IAC", "loopMIDI"
asid_multi_sid = true         # honor multi-SID streams on the U64 (see above)
asid_max_sids = 8             # cap on mapped SID chips (1-8); surplus downmixes
asid_buffered_player = "auto" # auto | on | off — cycle-accurate C64-side ring
                              # player for multispeed tunes (U64 only; see above)
# Oscilloscope knobs (shared with the waveform / midi scenes):
voice_colors = ["light green", "cyan", "yellow"]
color_mode = "per_voice"      # per_voice | per_waveform
time_base = "wallclock"       # wallclock | auto (auto sizes the window per pitch)
persistence = "off"           # off | short | medium | long | random
scroll_columns = 0            # 0 = redraw; >0 = FIFO scroll (int or [v1,v2,v3])
# target_fps = 30             # default = half video rate (30 NTSC / 25 PAL)
