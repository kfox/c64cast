#:schema ../../c64cast.schema.json
# Single-scene demo: video file ("video") playback with audio.
#
# Requires the `video` extra (PyAV):
#   pip install -e .[video]
#
# `file =` is a comma-separated list of paths, directories, and/or
# globs — each scene setup picks a random file from the resolved pool.
# If `file =` is omitted entirely, the scene falls back to scanning
# `assets/videos/` (the default directory). Drop a video into
# assets/videos/ and either set `file =` below or comment it out to
# use the default. Edit the display mode if you'd rather see it in
# PETSCII / MCM / etc.
#
# Audio is on by default for video scenes — the demuxer pushes the
# file's soundtrack into the AudioStreamer, which feeds the SID DAC. The
# audio playback position is the master clock, so A/V stays in sync.
# Set `audio = false` on the scene to mute. `[audio] enabled = true`
# is required globally for the soundtrack to play at all.
#
# Run:
#   python -m c64cast --config config/examples/scene-video.toml

[ultimate64]
url = "http://ultimate-64-ii.lan"

[audio]
enabled = true                # required for the soundtrack to be heard

[playlist]
interleave_videos = false   # the single-scene IS the video

[[scenes]]
type = "video"
display = "hires_edges"
# `file =` accepts: a single path, a directory, a glob, or any
# comma-separated combination. Each setup picks a random match.
#   file = "assets/videos/your-video.mp4"
#   file = "assets/videos"                          # whole directory
#   file = "assets/videos/*.mkv"                    # glob
#   file = "assets/videos, assets/extra/promo.mp4"  # combination
# Omit the field entirely to fall back to scanning assets/videos/.
file = "assets/videos/your-video.mp4"
# No `duration_s` — video scenes run until the video file ends and
# the config loader rejects the field. In single-scene mode the playlist
# tears the scene down at EOF and immediately restarts it, looping the
# file forever.
# audio = false                # uncomment to mute this scene only
