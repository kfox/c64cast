# Pre-commit hooks. Install with:
#   pip install pre-commit
#   pre-commit install
#
# Run manually against all files with:
#   pre-commit run --all-files
#
# These same hooks are enforced in CI (.github/workflows/ci.yml, "pre-commit"
# job, which skips the pyright/unittest hooks since the lint-and-test job
# already runs them across the Python matrix).
#
# NOTE: the ruff-pre-commit rev below pins the SAME ruff version as uv.lock
# (and therefore `make lint` / `make fmt`). Keep the two in sync — bump this
# rev whenever you `uv lock --upgrade-package ruff`, or formatting will differ
# between local `make fmt` and the pre-commit/CI check.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: pyright
        language: system
        pass_filenames: false
        types: [python]
      - id: unittest
        name: unittest
        entry: scripts/pre-commit.sh
        language: system
        pass_filenames: false
        types: [python]
